name = "tony-memory-booth"
main = "worker/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Static SPA is built by Vite into ./dist and served by the Worker.
[assets]
directory = "./dist"
binding = "ASSETS"

# Private object storage for recordings (local: lives in .wrangler/state).
[[r2_buckets]]
binding = "RECORDINGS"
bucket_name = "memory-booth-recordings"

# Authoritative index for the family view / reconciliation.
[[d1_databases]]
binding = "DB"
database_name = "memory-booth"
database_id = "fe6592ce-5806-4e1e-abd0-85ad86ba2a53"

# Non-secret vars. Secrets (BOOTH_SECRET, ADMIN_SECRET, TURNSTILE_SECRET) are set
# via `wrangler secret put` or the dashboard — never committed here.
# Flip TURNSTILE_DISABLED to "0" once a Turnstile widget + secret are configured.
[vars]
TURNSTILE_DISABLED = "1"
MAX_BYTES = "157286400"
MAX_DURATION_MS = "150000"
